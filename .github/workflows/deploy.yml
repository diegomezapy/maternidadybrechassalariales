name: Deploy Dashboard to GitHub Pages

on:
  # Ejecutar en push sobre la rama principal
  push:
    branches: ["main", "master"]
  # Permite ejecución manual
  workflow_dispatch:

# Permisos para escribir en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup de entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy statsmodels
          
      - name: Ejecutar Pipeline de Procesamiento de Datos
        run: |
          python scripts/1_generar_mock.py
          python scripts/2_procesamiento_datos.py
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Construir y Subir Artefactos (Frontend Estático)
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el repositorio al estar utilizando index.html en raíz
          path: '.'
          
      - name: Despliegue en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
